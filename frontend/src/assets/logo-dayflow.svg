<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded square base -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="#8B5CF6"/>

  <!-- Sun: half circle peeking over horizon -->
  <circle cx="64" cy="58" r="22" fill="#FBBF24"/>

  <!-- Horizon line (the "day" boundary) -->
  <rect x="24" y="76" width="80" height="3" rx="1.5" fill="rgba(255,255,255,0.95)"/>

  <!-- Flow waves below horizon (3 stacked curves) -->
  <path d="M32 92 Q44 86 56 92 Q68 98 80 92 Q90 87 96 92"
        stroke="rgba(255,255,255,0.95)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M32 104 Q44 98 56 104 Q68 110 80 104 Q90 99 96 104"
        stroke="rgba(255,255,255,0.7)" stroke-width="3" stroke-linecap="round" fill="none"/>
</svg>